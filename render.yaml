services:
  - type: web
    name: industrial-attachment-ams-api
    runtime: python
    plan: free
    buildCommand: bash build.sh
    preDeployCommand: python manage.py migrate && python manage.py ensure_admin_user
    startCommand: python -m gunicorn iams.wsgi:application
    healthCheckPath: /health/
    buildFilter:
      paths:
        - accounts/**
        - dashboard/**
        - iams/**
        - matching/**
        - organizations/**
        - students/**
        - manage.py
        - requirements.txt
        - build.sh
        - render.yaml
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: industrial-attachment-ams-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          type: web
          name: industrial-attachment-ams-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: DJANGO_SUPERUSER_ROLE
        value: coordinator
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  - type: web
    name: industrial-attachment-ams-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && REACT_APP_API_BASE_URL="${API_ORIGIN}/api" npm run build
    staticPublishPath: ./frontend/build
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: API_ORIGIN
        fromService:
          type: web
          name: industrial-attachment-ams-api
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: industrial-attachment-ams-db
    plan: free
